<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jmarna Holdings | Member Login</title>
  <link rel="stylesheet" href="main.css">
  <link rel="stylesheet" href="login.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="login-page">
  
  <header class="site-header">
    <div class="container nav-container">
      <div class="logo">
  <a href="index.html" class="logo-link">
    <i class="fas fa-shield-alt"></i> 
    <span>AETHEL <span class="vault">VAULT</span></span>
  </a>
</div>
      <nav class="main-nav">
        <ul>
          <li><a href="index.html">Home</a></li>
          
          <li><a href="index.html">Service</a></li>
          <li><a href="login.html" class="login-trigger active">Member login</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <section class="login-section full-height">
    <div class="container">
      <div class="login-panel animate-scale">
        <div class="vault-icon">
          <i class="fas fa-lock"></i>
        </div>
        <h2>Member Authentication</h2>
        <p class="secure-note">
          <i class="fas fa-shield"></i> 4096‑bit TLS · Secure entry point
        </p>
        
        <!-- Error message display -->
        <div id="errorMessage" class="error-message" style="display: none;"></div>
        
        <form id="memberLoginForm">
          <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" name="email" placeholder="Email Address" required autofocus>
          </div>
          <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" name="password" placeholder="Password" required>
          </div>
          
          <div class="login-options">
            <label class="remember-me">
              <input type="checkbox"> Remember device
            </label>
            <a href="#" class="forgot-password">Forgot password?</a>
          </div>
          
          <button type="submit" class="login-btn">
            Access vault <i class="fas fa-arrow-right"></i>
          </button>
        </form>
        
        <!-- Demo credentials helper (remove in production) 
        <div class="demo-credentials">
          <p><i class="fas fa-info-circle"></i> Demo credentials (click to auto-fill):</p>
          <div class="credential-list">
            <span onclick="fillCredentials('jonathan.harrington@aethelvault.com', 'harrington2025')">Jonathan H.</span>
            <span onclick="fillCredentials('james.smith@aethelvault.com', 'smith123')">James S.</span>
            <span onclick="fillCredentials('li.wong@aethelvault.com', 'wong2024')">Li Wei W.</span>
            <span onclick="fillCredentials('carlos.rodriguez@aethelvault.com', 'rodriguez2025')">Carlos R.</span>
            <span onclick="fillCredentials('michael.johnson@aethelvault.com', 'johnson2025')">Michael J.</span>
          </div>
        </div>-->
      </div>
    </div>
  </section>

  <footer class="site-footer minimal">
    <div class="container">
      <p>© 2025 Aethel Vault - Protected by end-to-end encryption</p>
    </div>
  </footer>

  <script>
    function fillCredentials(email, password) {
      document.getElementById('email').value = email;
      document.getElementById('password').value = password;
    }
  </script>
  <script src="login.js"></script>
</body>
</html>
